<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Расписание пар</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Университет</p>
        <h1>Расписание пар</h1>
      </div>
      <div class="header-actions">
        <label class="select-label">
          Группа
          <select id="groupSelect">
            <option value="group-a">Группа A</option>
            <option value="group-b">Группа B</option>
            <option value="group-c">Группа C</option>
          </select>
        </label>
      </div>
    </header>

    <main>
      <section class="summary-card">
        <div>
          <p class="summary-label">Текущая неделя</p>
          <h2 id="weekIndicator">1-я неделя</h2>
        </div>
        <div class="summary-actions">
          <button class="ghost-button" id="prevWeek">Назад</button>
          <button id="nextWeek">Вперед</button>
        </div>
      </section>

      <section class="schedule-panel">
        <div class="panel-header">
          <h2>Сегодня</h2>
          <span id="todayDate">---</span>
        </div>

        <div class="schedule-table-wrapper">
          <table class="schedule-table" aria-label="Расписание пар">
            <thead>
              <tr>
                <th>Дата</th>
                <th>Пара</th>
                <th>Дисциплина</th>
              </tr>
            </thead>
            <tbody id="scheduleBody">
              <tr class="empty-row">
                <td colspan="3">Данные расписания будут добавлены позже.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
