<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Расписание пар</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Университет</p>
        <h1>Расписание пар</h1>
      </div>
      <div class="header-actions">
        
        <button id="themeToggle" class="theme-toggle" aria-pressed="false">Светлая</button>
      </div>
    </header>

    <main>
      <section class="summary-card">
        <div>
          <p class="summary-label">Текущая неделя</p>
          <h2 id="weekIndicator">1-я неделя</h2>
        </div>
        <div class="summary-actions">
          <button class="ghost-button" id="prevWeek">Назад</button>
          <button id="nextWeek">Вперед</button>
        </div>
      </section>

      <section class="schedule-panel">
        <div class="panel-header">
          <h2>Сегодня</h2>
          <span id="todayDate">---</span>
        </div>

        <div class="schedule-table-wrapper">
          <div id="scheduleList" class="schedule-list">
            <p class="empty-row">Данные расписания будут добавлены позже.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
